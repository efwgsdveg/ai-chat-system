<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>зҷ»еҪ• - еҚғеёҶAI</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
}

.container{
    width:400px;
    margin:120px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>еҚғеёҶ AI</h2>

<input id="username" placeholder="з”ЁжҲ·еҗҚ">
<input id="password" type="password" placeholder="еҜҶз Ғ">

<button onclick="login()">зҷ»еҪ•</button>
<button onclick="register()">жіЁеҶҢ</button>

</div>

<script>

async function register(){

    const username=document.getElementById("username").value
    const password=document.getElementById("password").value

    if(!username || !password){
        alert("иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚе’ҢеҜҶз Ғ")
        return
    }

    const res=await fetch(`http://127.0.0.1:8000/register?username=${username}&password=${password}`,{
        method:"POST"
    })

    const data=await res.json()

    alert(data.msg)
}

async function login(){

    const username=document.getElementById("username").value
    const password=document.getElementById("password").value

    const res=await fetch(`http://127.0.0.1:8000/login?username=${username}&password=${password}`,{
        method:"POST"
    })

    const data=await res.json()

    if(data.user_id){

        localStorage.setItem("user_id",data.user_id)

        alert("зҷ»еҪ•жҲҗеҠҹ")

        window.location.href="chat.html"

    }else{

        alert(data.msg||"зҷ»еҪ•еӨұиҙҘ")

    }
}

</script>

</body>
</html>
