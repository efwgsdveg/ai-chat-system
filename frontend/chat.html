<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>千帆 AI</title>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
}

/* 左侧聊天列表 */

.sidebar{
    width:250px;
    background:#202123;
    color:white;
    display:flex;
    flex-direction:column;
}

.sidebar h3{
    text-align:center;
}

.new-chat{
    padding:10px;
    margin:10px;
    background:#343541;
    border:none;
    color:white;
    cursor:pointer;
}

.session{
    padding:10px;
    border-bottom:1px solid #444;
    cursor:pointer;
}

.session:hover{
    background:#343541;
}

.logout{
    margin-top:auto;
    padding:10px;
    background:#444;
    border:none;
    color:white;
    cursor:pointer;
}

/* 聊天区域 */

.chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f5f5f5;
}

.message{
    margin:10px 0;
    display:flex;
}

.user{
    justify-content:flex-end;
}

.ai{
    justify-content:flex-start;
}

.bubble{
    max-width:60%;
    padding:10px 15px;
    border-radius:10px;
}

.user .bubble{
    background:#007bff;
    color:white;
}

.ai .bubble{
    background:#e5e5ea;
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
}

button{
    padding:10px 20px;
}

</style>

</head>

<body>

<!-- 左侧会话 -->
<div class="sidebar">

<h3>千帆AI</h3>

<button class="new-chat" onclick="newChat()">+ 新聊天</button>

<div id="sessions"></div>

<button class="logout" onclick="logout()">退出登录</button>

</div>

<!-- 聊天区域 -->
<div class="chat-container">

<div id="chat" class="chat"></div>

<div class="input-area">

<input id="msg" placeholder="输入问题...">

<button onclick="send()">发送</button>

</div>

</div>


<script>

const user_id = localStorage.getItem("user_id")



if(!user_id){
    window.location.href="index.html"
}

let session_id = localStorage.getItem("session_id")

if(!session_id){
    session_id = Date.now().toString()
    localStorage.setItem("session_id",session_id)
}

function newChat(){

    session_id = Date.now().toString()

    localStorage.setItem("session_id",session_id)

    document.getElementById("chat").innerHTML=""
}

function logout(){

    localStorage.clear()

    window.location.href="index.html"
}

function addMessage(role,text){

    const chat=document.getElementById("chat")

    const msg=document.createElement("div")
    msg.className="message "+role

    const bubble=document.createElement("div")
    bubble.className="bubble"

    bubble.innerText=text

    msg.appendChild(bubble)

    chat.appendChild(msg)

    chat.scrollTop=chat.scrollHeight
}

async function loadHistory(){

    const res=await fetch(`http://127.0.0.1:8000/history/${session_id}?user_id=${user_id}`)
    const data=await res.json()

    for(let m of data){

        addMessage(m.role=="assistant"?"ai":"user",m.content)

    }

}

loadHistory()

async function send(){

    const input=document.getElementById("msg")

    const message=input.value

    if(!message) return

    addMessage("user",message)

    input.value=""

    const res=await fetch("http://127.0.0.1:8000/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            session_id:session_id,
            message:message,
            user_id:user_id 
        })

    })

    const data=await res.json()

    addMessage("ai",data.ai_reply)

}

loadSessions()

async function loadSessions(){

    const res = await fetch(`http://127.0.0.1:8000/sessions/${user_id}`)

    const data = await res.json()

    const container = document.getElementById("sessions")

    container.innerHTML=""

    for(let s of data){

        const div=document.createElement("div")
        div.className="session"
        div.style.display="flex"
        div.style.justifyContent="space-between"

        const title=document.createElement("span")
        title.innerText=s.title

        title.onclick=function(){
            session_id=s.session_id
            localStorage.setItem("session_id",session_id)
            location.reload()
        }

        const del=document.createElement("span")
        del.innerText="❌"
        del.style.cursor="pointer"

        del.onclick=async function(e){

            e.stopPropagation()

            if(!confirm("确定删除该聊天？")) return

            await fetch(`http://127.0.0.1:8000/session/${s.session_id}?user_id=${user_id}`,{
                 method:"DELETE"
            })

            // ✅ 如果删除的是当前会话
            if(session_id === s.session_id){
                session_id = Date.now().toString()
                localStorage.setItem("session_id", session_id)
                document.getElementById("chat").innerHTML = ""
            }

                loadSessions()
        }

        div.appendChild(title)
        div.appendChild(del)

        container.appendChild(div)
    }

}



</script>

</body>
</html>
